steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/aulaviva-backend:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/aulaviva-backend:latest', '.']

  # 2. Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aulaviva-backend:$COMMIT_SHA']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aulaviva-backend:latest']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aulaviva-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aulaviva-backend:$COMMIT_SHA'
      - '--region'
      - 'southamerica-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--project'
      - '$PROJECT_ID'
      - '--set-env-vars'
      - 'SUPABASE_DB_HOST=PLACEHOLDER_HOST,SUPABASE_DB_PORT=6543,SUPABASE_DB_NAME=postgres,SUPABASE_DB_USER=PLACEHOLDER_USER,SUPABASE_DB_PASSWORD=PLACEHOLDER_PASSWORD,SUPABASE_URL=PLACEHOLDER_SUPABASE_URL,SUPABASE_ANON_KEY=PLACEHOLDER_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY=PLACEHOLDER_SERVICE_ROLE_KEY,JWT_SECRET=PLACEHOLDER_JWT_SECRET'

images:
  - 'gcr.io/$PROJECT_ID/aulaviva-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/aulaviva-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
